services:
  api:
    build: ./RBAC-Backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: RBAC_db
    depends_on:
      - db

  web:
    build: ./RBAC-Frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: RBAC_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
